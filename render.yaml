databases:
  - name: vendor-postgres
    databaseName: vendor
    user: vendor

services:
  - type: web
    name: vendor-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_ALLOWED_HOSTS
        value: your-backend-domain.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-backend-domain.onrender.com,https://your-frontend-domain.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: vendor-postgres
          property: connectionString
